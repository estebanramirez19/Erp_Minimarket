{% extends "base.html" %}
{% block contenido %}
<h1>{% if form.instance.pk %}Editar Caja{% else %}Nueva Caja{% endif %}</h1>

<form method="post">
  {% csrf_token %}
  {{ form.as_p }}
  <button type="submit" class="btn btn-success">Guardar</button>
  <a href="{% url 'contabilidad:caja_list' %}" class="btn btn-secondary">Cancelar</a>
</form>
{% endblock %}
